version: 1
defaultRule: prompt
rules:
  - selector:
      tool: run_shell_command
      pattern: ^git|^gh
    action: allow
  - selector:
      tool: run_shell_command
      pattern: ^task
    action: allow
  - selector:
      tool: run_shell_command
      pattern: ^pytest|^npm test|^yarn test|^go test|^cargo test
    action: allow
  - selector:
      tool: run_shell_command
      pattern: .*
    action: deny
